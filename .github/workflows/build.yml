name: Build

on:
  push:
    branches:
      - main
      - agent/vercel-readiness
  pull_request:
    branches:
      - main

jobs:
  imports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check local imports
        run: node scripts/check-local-imports.mjs

  build:
    needs: imports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build application
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Build failed. Showing the final 120 log lines:"
            tail -n 120 build.log
            exit "$status"
          fi
          cat build.log
